# ===== Server =====
server.port=8080

# ===== DataSource (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/quanlyphongtro?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=phongtro_user
spring.datasource.password=phongtro_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== JWT =====
app.jwt.secret=quanlyphongtro-super-secret-key-change-in-production-must-be-256bit
app.jwt.expiration-ms=86400000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000

# ===== Actuator =====
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===== File upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Logging =====
logging.level.com.phontro=DEBUG
logging.level.org.springframework.security=INFO