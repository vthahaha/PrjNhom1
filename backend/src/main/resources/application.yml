server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://db:3306/room_rental?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    # Secret phải là chuỗi Base64 encode của ít nhất 32 bytes (256 bit) để HMAC-SHA256 hoạt động.
    # Giá trị mặc định dưới đây là Base64 của: "RoomRental@2026!SecretKey#ForJWT_HmacSHA256_MustBe32BytesOrMore"
    secret: ${JWT_SECRET:Um9vbVJlbnRhbEAyMDI2IVNlY3JldEtleSNGb3JKV1RfSG1hY1NIQTI1Nl9NdXN0QmUzMkJ5dGVzT3JNb3Jl}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 giờ (ms)
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Actuator – chỉ expose /actuator/health cho Docker healthcheck
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never   # ẩn chi tiết DB credential khỏi response
  health:
    mail:
      enabled: false        # tắt mail health check (mail chưa cấu hình không nên làm app DOWN)
